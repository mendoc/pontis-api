services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pontis_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - pontis_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/mendoc/pontis-api:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      REDIS_URL: "redis://redis:6379"
      NODE_ENV: production
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      SMTP_HOST: smtp.resend.com
      SMTP_PORT: "465"
      SMTP_SECURE: "true"
      SMTP_USER: resend
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: "Pontis <no-reply@pontis.ongoua.pro>"
      FRONTEND_URL: ${FRONTEND_URL}
      GITLAB_URL: ${GITLAB_URL}
      GITLAB_CLIENT_ID: ${GITLAB_CLIENT_ID}
      GITLAB_CLIENT_SECRET: ${GITLAB_CLIENT_SECRET}
      GITLAB_CALLBACK_URL: ${GITLAB_CALLBACK_URL}
      APP_DOMAIN: app.ongoua.pro
      DOCKER_NETWORK: pontis_network
      PROJECTS_DIR: ${PROJECTS_DIR}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PROJECTS_DIR}:${PROJECTS_DIR}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - pontis_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.pontis.ongoua.pro`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=3001"

volumes:
  postgres_data:
  redis_data:

networks:
  pontis_network:
    external: true
