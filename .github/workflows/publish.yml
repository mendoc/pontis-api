name: Publish Docker image

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from package.json
        id: version
        run: echo "version=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u mendoc --password-stdin

      - name: Build image
        run: |
          docker build \
            -t ghcr.io/mendoc/pontis-api:${{ steps.version.outputs.version }} \
            -t ghcr.io/mendoc/pontis-api:latest \
            .

      - name: Push versioned tag
        run: docker push ghcr.io/mendoc/pontis-api:${{ steps.version.outputs.version }}

      - name: Push latest tag
        run: docker push ghcr.io/mendoc/pontis-api:latest
